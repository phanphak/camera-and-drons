    <style>
      .container-Detail {
        width: 100%;
      }
      .container-Detail .mainDetail {
        width: 800px;
        height: 400px;
        box-shadow: 1px 1px 10px 1px gainsboro;
        margin: auto;
        display: flex;
        gap: 30px;
        border-radius: 5px;
        margin-top: 40px;
      }
      .mainDetail .image {
        width: 50%;
        height: 100%;
        padding: 10px;
      }
      .mainDetail .image img{
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 5px;

      }

      .mainDetail .info-detail {
        width: 50%;
        
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
      }
      .info-detail h3 {
        color: rgb(45, 44, 44);
      }
      .info-detail .detaile-price {
        font-size: 25px;
        font-weight: bold;
        color: rgb(45, 44, 44);
        margin-top: 10px;
      }
      .info-detail .star{
        
        display: flex;
        gap: 4px;
      }
      .info-detail .star svg{
        width: 12px;
        height: 12px;
        color: yellowgreen;
        
      }
      .info-detail .btn{
        display: flex;
        gap: 10px;
        align-items: center;
        padding-top: 10px;
      }
      .info-detail .btn button{
        padding: 5px 20px;
        background-color: blueviolet;
        color: white;
        border-radius: 5px;
        border: none;
        cursor: pointer;
      }
      .info-detail .btn button:hover{
        background-color: blue;
      }

      .info-detail .des-detaile{
        color: rgb(62, 61, 61);
      }

      @media screen and (max-width: 640px){
        .container-Detail .mainDetail{
          width: 100%;
          height: 600px;
          
          box-shadow: none;
          flex-direction: column;
          padding: 0px 10px;
          padding-bottom: 30px;
          row-gap: 0;
          margin-top: 0;

        }

        .mainDetail .image{
          width: 100%;
          height: 40%;
        }
        

        .mainDetail .info-detail{
          width: 100%;
          
        }

      }


      /* teblet */
      @media screen and (min-width: 746px) and (max-width: 900px){
        .container-Detail{
          display: flex;
          justify-content: center;
          /* height: 500px; */
        }
        
        .container-Detail .mainDetail{
          width: 96%;
        
          
        }
      }
